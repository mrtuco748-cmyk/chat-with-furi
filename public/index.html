<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat con amor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login">
    <div class="login-box">
      <h1>💕 Chat con amor</h1>
      <p>Ingresá el código secreto y tu nombre</p>
      <input type="text" id="codigoInput" placeholder="Código secreto..." maxlength="20">
      <input type="text" id="nombreInput" placeholder="Tu nombre..." maxlength="20">
      <button id="entrarBtn">Entrar</button>
    </div>
  </div>

  <div id="chat" class="oculto">
    <div class="chat-header">
      <h2>💕 Chat con amor</h2>
      <span id="usuarioActual"></span>
    </div>
    <div class="chat-mensajes" id="mensajes"></div>
    <div class="chat-input">
      <input type="text" id="mensajeInput" placeholder="Escribí un mensaje..." maxlength="500">
      <button id="enviarBtn">Enviar</button>
    </div>
    <div id="escribiendo"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
