<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat con amor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="login">
    <div class="login-box">
      <h1>💕 Chat con amor</h1>
      <p>Ingresá el código secreto y tu nombre</p>
      <input type="text" id="codigoInput" placeholder="Código secreto..." maxlength="20">
      <input type="text" id="nombreInput" placeholder="Tu nombre..." maxlength="20">
      <button id="entrarBtn">Entrar</button>
    </div>
  </div>

  <div id="chat" class="oculto">
    <div class="chat-header">
      <div class="header-left">
        <span class="avatar">💕</span>
        <div>
          <div class="header-title">Chat con amor</div>
          <div class="header-status"><span id="estadoConexion" class="conectado"></span> <span id="headerEstado">en línea</span></div>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" id="menuBtn">⋮</button>
      </div>
    </div>
    <div class="chat-mensajes" id="mensajes"></div>
    <div id="escribiendo"></div>
    <div id="grabando" class="oculto">
      <span class="grabando-indicator">🔴</span> Grabando... <span id="tiempoGrabacion">0s</span>
      <span class="grabando-cancel" id="cancelarGrabacion">✕</span>
    </div>
    <div id="emojiPicker" class="oculto"></div>
    <div id="attachMenu" class="oculto">
      <div class="attach-overlay" id="attachOverlay"></div>
      <div class="attach-sheet">
        <button class="attach-option" data-tipo="camara">📷 Cámara</button>
        <button class="attach-option" data-tipo="galeria">🖼️ Galería</button>
      </div>
    </div>
    <div class="chat-input">
      <button class="input-btn" id="attachBtn">📎</button>
      <button class="input-btn" id="emojiBtn">😊</button>
      <input type="text" id="mensajeInput" placeholder="Mensaje" maxlength="500">
      <button class="input-btn mic-btn2 oculto" id="microfonoBtn2">🎤</button>
      <button class="send-btn oculto" id="enviarBtn">▶</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
