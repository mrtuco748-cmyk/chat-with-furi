<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat con amor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
</head>
<body class="wallpaper-default">
  <div id="login">
    <div class="login-box">
      <h1>Chat con amor</h1>
      <p>Ingresá el código secreto y tu nombre</p>
      <input type="text" id="codigoInput" placeholder="Código secreto..." maxlength="20">
      <input type="text" id="nombreInput" placeholder="Tu nombre..." maxlength="20">
      <button id="entrarBtn">Entrar</button>
    </div>
  </div>

  <div id="chat" class="oculto">
    <div class="chat-header glass">
      <div class="header-left">
        <span class="avatar-ring"><span class="avatar-heart" data-icon="heart-filled"></span></span>
        <div>
          <div class="header-title" id="headerTitle">Mi amor</div>
          <div class="header-status"><span id="estadoConexion" class="conectado"></span> <span id="headerEstado">en l&iacute;nea</span></div>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" id="searchBtn" data-icon="search"></button>
        <button class="header-btn" id="statsBtn" data-icon="heart-filled"></button>
        <button class="header-btn" id="wallpaperBtn" data-icon="image"></button>
      </div>
    </div>
    <div id="searchBar" class="oculto glass">
      <button class="search-back" id="searchBack" data-icon="arrow-left"></button>
      <input type="text" id="searchInput" placeholder="Buscar mensajes..." maxlength="100">
      <span class="search-count" id="searchCount"></span>
    </div>
    <div class="chat-mensajes" id="mensajes"></div>
    <div id="escribiendo"><div class="typing-dots"><span></span><span></span><span></span></div></div>
    <div id="grabando" class="oculto glass">
      <span class="grabando-indicator"></span> Grabando... <span id="tiempoGrabacion">0s</span>
      <span class="grabando-lock" id="lockHint">&uarr; bloquear</span>
      <span class="grabando-cancel" id="cancelarGrabacion" data-icon="x"></span>
    </div>
    <div id="replyBar" class="oculto glass">
      <div class="reply-line"></div>
      <div class="reply-content">
        <div class="reply-label">Respondiendo a <span id="replyUser"></span></div>
        <div class="reply-text" id="replyText"></div>
      </div>
      <button class="reply-close" id="replyClose" data-icon="x"></button>
    </div>
    <div id="editBar" class="oculto glass">
      <span class="edit-icon" data-icon="edit"></span>
      <span>Editando mensaje</span>
      <button class="reply-close" id="editClose" data-icon="x"></button>
    </div>
    <div id="emojiPicker" class="oculto glass"></div>
    <div id="attachMenu" class="oculto">
      <div class="attach-overlay" id="attachOverlay"></div>
      <div class="attach-sheet glass">
        <button class="attach-option" data-tipo="camara"><span data-icon="camera"></span> C&aacute;mara</button>
        <button class="attach-option" data-tipo="galeria"><span data-icon="image"></span> Galer&iacute;a</button>
      </div>
    </div>
    <div id="wallpaperMenu" class="oculto">
      <div class="attach-overlay" id="wallpaperOverlay"></div>
      <div class="attach-sheet glass">
        <div class="wallpaper-title">Fondo de pantalla</div>
        <div class="wallpaper-opts">
          <button class="wp-opt" data-wp="default"></button>
          <button class="wp-opt" data-wp="rose"></button>
          <button class="wp-opt" data-wp="sunset"></button>
          <button class="wp-opt" data-wp="ocean"></button>
          <button class="wp-opt" data-wp="lavender"></button>
        </div>
      </div>
    </div>
    <div id="quickReactions" class="oculto glass">
      <span class="qr-emoji" data-reaccion="❤️">❤️</span>
      <span class="qr-emoji" data-reaccion="😂">😂</span>
      <span class="qr-emoji" data-reaccion="😮">😮</span>
      <span class="qr-emoji" data-reaccion="😢">😢</span>
      <span class="qr-emoji" data-reaccion="🙏">🙏</span>
      <span class="qr-emoji" data-reaccion="🔥">🔥</span>
    </div>
    <div id="imagePreview" class="oculto">
      <div class="attach-overlay" id="imgPrevOverlay"></div>
      <div class="imgprev-sheet glass">
        <div class="imgprev-header">
          <span class="imgprev-title">Previsualizar</span>
          <button class="header-btn" id="imgPrevSend" data-icon="heart"></button>
        </div>
        <div class="imgprev-body">
          <img id="imgPrevImage" src="" alt="Preview">
        </div>
      </div>
    </div>
    <div id="statsModal" class="oculto">
      <div class="stats-overlay" id="statsOverlay"></div>
      <div class="stats-sheet glass">
        <div class="stats-title">Nuestro amor 💕</div>
        <div class="stats-grid">
          <div class="stat-item"><span class="stat-num" id="statDias">0</span><span class="stat-label">d&iacuteas juntos</span></div>
          <div class="stat-item"><span class="stat-num" id="statMsgs">0</span><span class="stat-label">mensajes</span></div>
          <div class="stat-item"><span class="stat-num" id="statFotos">0</span><span class="stat-label">fotos</span></div>
          <div class="stat-item"><span class="stat-num" id="statAudios">0</span><span class="stat-label">audios</span></div>
        </div>
        <button class="stats-btn" id="statsSetDate">Fijar fecha de inicio</button>
      </div>
    </div>
    <div id="msgMenu" class="oculto">
      <div class="msgmenu-overlay" id="msgmenuOverlay"></div>
      <div class="msgmenu-sheet glass">
        <button class="msgmenu-option oculto" id="menuEditar"><span data-icon="edit"></span> Editar</button>
        <button class="msgmenu-option" id="menuResponder"><span data-icon="reply"></span> Responder</button>
        <button class="msgmenu-option" id="menuCopiar"><span data-icon="copy"></span> Copiar</button>
        <button class="msgmenu-option oculto" id="menuEliminarPropio"><span data-icon="trash"></span> Eliminar para m&iacute;</button>
        <button class="msgmenu-option oculto" id="menuEliminarTodos"><span data-icon="trash"></span> Eliminar para todos</button>
      </div>
    </div>
    <button class="scroll-btn oculto" id="scrollBtn" data-icon="heart-filled"></button>
    <div class="chat-input glass">
      <button class="input-btn" id="attachBtn" data-icon="paperclip"></button>
      <button class="input-btn camara-btn" id="camaraBtn" data-icon="camera"></button>
      <button class="input-btn" id="emojiBtn" data-icon="smile"></button>
      <input type="text" id="mensajeInput" placeholder="Mensaje" maxlength="500">
      <button class="input-btn mic-btn2" id="microfonoBtn2" data-icon="mic"></button>
      <button class="send-btn oculto" id="enviarBtn" data-icon="heart"></button>
    </div>
    <div id="toastContainer"></div>
    <div id="imageViewer" class="oculto">
      <div class="iv-overlay" id="ivOverlay"></div>
      <div class="iv-content">
        <img id="ivImage" src="" alt="">
        <div class="iv-info" id="ivInfo"></div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
