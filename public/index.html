<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat con amor</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
</head>
<body class="wallpaper-default">
  <div id="login">
    <div class="login-box">
      <h1>Chat con amor</h1>
      <p>Ingresá el código secreto y tu nombre</p>
      <input type="text" id="codigoInput" placeholder="Código secreto..." maxlength="20">
      <input type="text" id="nombreInput" placeholder="Tu nombre..." maxlength="20">
      <button id="entrarBtn">Entrar</button>
    </div>
  </div>

  <div id="chat" class="oculto">
    <div class="chat-header glass">
      <div class="header-left">
        <span class="avatar-ring"><span class="avatar-heart" data-icon="heart-filled"></span></span>
        <div>
          <div class="header-title">Mi amor</div>
          <div class="header-status"><span id="estadoConexion" class="conectado"></span> <span id="headerEstado">en línea</span></div>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" id="wallpaperBtn" data-icon="image"></button>
      </div>
    </div>
    <div class="chat-mensajes" id="mensajes"></div>
    <div id="escribiendo"></div>
    <div id="grabando" class="oculto glass">
      <span class="grabando-indicator"></span> Grabando... <span id="tiempoGrabacion">0s</span>
      <span class="grabando-lock" id="lockHint">⬆ bloquear</span>
      <span class="grabando-cancel" id="cancelarGrabacion" data-icon="x"></span>
    </div>
    <div id="replyBar" class="oculto glass">
      <div class="reply-line"></div>
      <div class="reply-content">
        <div class="reply-label">Respondiendo a <span id="replyUser"></span></div>
        <div class="reply-text" id="replyText"></div>
      </div>
      <button class="reply-close" id="replyClose" data-icon="x"></button>
    </div>
    <div id="emojiPicker" class="oculto glass"></div>
    <div id="attachMenu" class="oculto">
      <div class="attach-overlay" id="attachOverlay"></div>
      <div class="attach-sheet glass">
        <button class="attach-option" data-tipo="camara"><span data-icon="camera"></span> Cámara</button>
        <button class="attach-option" data-tipo="galeria"><span data-icon="image"></span> Galería</button>
      </div>
    </div>
    <div id="wallpaperMenu" class="oculto">
      <div class="attach-overlay" id="wallpaperOverlay"></div>
      <div class="attach-sheet glass">
        <div class="wallpaper-title">Fondo de pantalla</div>
        <div class="wallpaper-opts">
          <button class="wp-opt" data-wp="default"></button>
          <button class="wp-opt" data-wp="rose"></button>
          <button class="wp-opt" data-wp="sunset"></button>
          <button class="wp-opt" data-wp="ocean"></button>
          <button class="wp-opt" data-wp="lavender"></button>
        </div>
      </div>
    </div>
    <div id="msgMenu" class="oculto">
      <div class="msgmenu-overlay" id="msgmenuOverlay"></div>
      <div class="msgmenu-sheet glass">
        <button class="msgmenu-option" id="menuResponder"><span data-icon="reply"></span> Responder</button>
        <button class="msgmenu-option" id="menuCopiar"><span data-icon="copy"></span> Copiar</button>
        <button class="msgmenu-option oculto" id="menuEliminar"><span data-icon="trash"></span> Eliminar para mí</button>
      </div>
    </div>
    <button class="scroll-btn oculto" id="scrollBtn" data-icon="heart-filled"></button>
    <div class="chat-input glass">
      <button class="input-btn" id="attachBtn" data-icon="paperclip"></button>
      <button class="input-btn camara-btn" id="camaraBtn" data-icon="camera"></button>
      <button class="input-btn" id="emojiBtn" data-icon="smile"></button>
      <input type="text" id="mensajeInput" placeholder="Mensaje" maxlength="500">
      <button class="input-btn mic-btn2" id="microfonoBtn2" data-icon="mic"></button>
      <button class="send-btn oculto" id="enviarBtn" data-icon="heart"></button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
